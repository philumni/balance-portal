<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance Portal — Verify Email</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3347;
      --text:#e8eaf0; --muted:#6b7280; --accent:#6366f1; --accent-g:rgba(99,102,241,0.25);
    }
    body { background:var(--bg); font-family:'Plus Jakarta Sans',sans-serif; color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    body::before { content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px;
      padding:3rem 2rem; width:100%; max-width:420px; position:relative;
      box-shadow:0 0 60px rgba(0,0,0,0.4); text-align:center; }
    .card::before { content:''; position:absolute; top:0; left:2rem; right:2rem; height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent); border-radius:2px; }
    .icon { font-size:3rem; margin-bottom:1rem; display:block; }
    h1 { font-size:1.5rem; font-weight:700; margin-bottom:0.5rem; letter-spacing:-0.02em; }
    p { color:var(--muted); font-size:0.9rem; line-height:1.6; margin-bottom:1.5rem; }
    .spinner-wrap { display:flex; justify-content:center; margin:1.5rem 0; }
    .spinner { width:36px; height:36px; border:3px solid var(--border);
      border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .alert { padding:0.75rem 1rem; border-radius:8px; font-size:0.85rem; margin-bottom:1.25rem; display:none; }
    .alert.show { display:block; }
    .alert-error   { background:rgba(239,68,68,0.1);  border:1px solid rgba(239,68,68,0.3);  color:#fca5a5; }
    .alert-success { background:rgba(34,197,94,0.1);  border:1px solid rgba(34,197,94,0.3);  color:#86efac; }
    .btn { display:inline-block; padding:0.8rem 2rem; background:var(--accent); color:#fff;
      font-family:inherit; font-size:0.95rem; font-weight:600; border:none; border-radius:8px;
      cursor:pointer; text-decoration:none; transition:opacity 0.2s; display:none; }
    .btn.show { display:inline-block; }
    .btn:hover { opacity:0.9; }
  </style>
</head>
<body>
<div class="card">
  <span class="icon" id="statusIcon">📧</span>
  <h1 id="statusTitle">Verifying your email…</h1>
  <p id="statusMsg">Please wait while we confirm your account.</p>

  <div id="alert" class="alert"></div>

  <div class="spinner-wrap" id="spinnerWrap">
    <div class="spinner"></div>
  </div>

  <a href="dashboard.html" class="btn" id="dashBtn">Go to Dashboard →</a>
</div>

<script src="js/verify.js"></script>
</body>
</html>
