<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance Portal — Create Account</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#0f1117; --surface:#1a1d27; --surface2:#22263a; --border:#2e3347;
      --text:#e8eaf0; --muted:#6b7280; --accent:#6366f1; --accent-g:rgba(99,102,241,0.25);
    }
    body { background:var(--bg); font-family:'Plus Jakarta Sans',sans-serif; color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; }
    body::before { content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(99,102,241,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(99,102,241,0.03) 1px,transparent 1px);
      background-size:40px 40px; pointer-events:none; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:16px;
      padding:2.5rem 2rem; width:100%; max-width:460px; position:relative;
      box-shadow:0 0 60px rgba(0,0,0,0.4); }
    .card::before { content:''; position:absolute; top:0; left:2rem; right:2rem; height:2px;
      background:linear-gradient(90deg,transparent,var(--accent),transparent); border-radius:2px; }
    .logo { display:flex; align-items:center; gap:0.6rem; margin-bottom:2rem; }
    .logo-mark { width:34px; height:34px; background:var(--accent); border-radius:8px;
      display:flex; align-items:center; justify-content:center; font-size:1rem;
      box-shadow:0 0 20px var(--accent-g); }
    .logo-name { font-family:'IBM Plex Mono',monospace; font-size:1rem; font-weight:500; }
    h1 { font-size:1.6rem; font-weight:700; margin-bottom:0.35rem; letter-spacing:-0.02em; }
    .subtitle { font-size:0.875rem; color:var(--muted); margin-bottom:2rem; }
    .alert { padding:0.75rem 1rem; border-radius:8px; font-size:0.85rem; margin-bottom:1.25rem; display:none; line-height:1.5; }
    .alert.show { display:block; }
    .alert-error   { background:rgba(239,68,68,0.1);  border:1px solid rgba(239,68,68,0.3);  color:#fca5a5; }
    .alert-success { background:rgba(34,197,94,0.1);  border:1px solid rgba(34,197,94,0.3);  color:#86efac; }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .form-group { margin-bottom:1.1rem; }
    label { display:block; font-size:0.8rem; font-weight:600; color:var(--muted);
      letter-spacing:0.05em; text-transform:uppercase; margin-bottom:0.4rem; }
    input { width:100%; padding:0.7rem 0.9rem; background:var(--surface2); border:1px solid var(--border);
      border-radius:8px; color:var(--text); font-family:inherit; font-size:0.95rem;
      transition:border-color 0.2s,box-shadow 0.2s; outline:none; }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-g); }
    input::placeholder { color:#3d4257; }
    input.invalid { border-color:rgba(239,68,68,0.6); }
    .field-hint { font-size:0.72rem; color:var(--muted); margin-top:0.3rem; }
    /* password strength bar */
    .strength-wrap { margin-top:0.4rem; }
    .strength-bar { height:3px; border-radius:2px; background:var(--border); overflow:hidden; }
    .strength-fill { height:100%; width:0%; transition:width 0.3s, background 0.3s; border-radius:2px; }
    .strength-label { font-size:0.7rem; color:var(--muted); margin-top:0.25rem; }
    .btn { width:100%; padding:0.8rem; background:var(--accent); color:#fff; font-family:inherit;
      font-size:0.95rem; font-weight:600; border:none; border-radius:8px; cursor:pointer;
      margin-top:0.5rem; transition:opacity 0.2s; }
    .btn:hover { opacity:0.9; } .btn:disabled { opacity:0.6; cursor:not-allowed; }
    .btn-outline { background:transparent; border:1px solid var(--border); color:var(--muted);
      margin-top:0.75rem; }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); opacity:1; }
    .spinner { display:none; width:16px; height:16px; border:2px solid rgba(255,255,255,0.3);
      border-top-color:#fff; border-radius:50%; animation:spin 0.7s linear infinite; margin:0 auto; }
    @keyframes spin { to { transform:rotate(360deg); } }
    /* verification token box */
      border:1px solid rgba(99,102,241,0.4); border-radius:8px; font-size:0.82rem; }
    .token-link { color:#818cf8; word-break:break-all; cursor:pointer; text-decoration:underline; }
    .token-link:hover { color:#a5b4fc; }
    @media (max-width:480px) { .row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-mark">⬡</div>
    <span class="logo-name">BalancePortal</span>
  </div>
  <h1>Create Account</h1>
  <p class="subtitle">Takes about 30 seconds. Verify your email to activate.</p>

  <div id="alert" class="alert"></div>

  <div class="row">
    <div class="form-group">
      <label for="firstName">First Name</label>
      <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name"/>
    </div>
    <div class="form-group">
      <label for="lastName">Last Name</label>
      <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name"/>
    </div>
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="jane@example.com" autocomplete="email"/>
  </div>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="3-20 chars, letters/numbers/_" autocomplete="username"/>
    <div class="field-hint">Letters, numbers, and underscores only.</div>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Min 8 chars, 1 uppercase, 1 number"
           autocomplete="new-password" oninput="updateStrength(this.value)"/>
    <div class="strength-wrap">
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
  </div>

  <div class="form-group">
    <label for="confirm">Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat password" autocomplete="new-password"/>
  </div>

  <button class="btn" id="registerBtn" onclick="handleRegister()">
    <span id="btnText">Create Account</span>
    <div id="btnSpinner" class="spinner"></div>
  </button>

  <button class="btn btn-outline" onclick="window.location.href='index.html'">
    Already have an account? Sign In
  </button>

  
</div>

<script src="js/register.js"></script>
</body>
</html>
